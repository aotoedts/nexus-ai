name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_password
          POSTGRES_DB: nexus_ai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://nexus:nexus_password@localhost:5432/nexus_ai_test?schema=public
      JWT_SECRET: ci_test_secret_key
      REFRESH_TOKEN_SECRET: ci_test_refresh_secret
      AI_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --workspace=backend
      - run: npm run prisma:generate --workspace=backend
      - run: npm run lint --workspace=backend
      - run: npm run test --workspace=backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --workspace=frontend
      - run: npm run lint --workspace=frontend
      - run: npm run build --workspace=frontend
