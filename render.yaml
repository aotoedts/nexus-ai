# Render Blueprint — deploy do Nexus AI com um unico arquivo.
# Doc oficial: https://render.com/docs/blueprint-spec
#
# Como usar (direto do celular, sem terminal):
# 1. Faca push deste repositorio para o GitHub.
# 2. No site do Render (render.com), va em "New" > "Blueprint".
# 3. Selecione o repositorio. O Render le este arquivo e mostra os 3
#    recursos abaixo (banco, backend, frontend) para voce confirmar.
# 4. Clique em "Apply" / "Deploy Blueprint".
#
# Depois do primeiro deploy, veja docs/DEPLOY_RENDER.md para rodar as
# migrations do banco (passo manual, uma unica vez).

databases:
  - name: nexus-postgres
    databaseName: nexus_ai
    user: nexus
    plan: free
    postgresMajorVersion: "16"

services:
  # --- Backend (API + WebSocket) ---
  - type: web
    name: nexus-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3333"
      - key: HOST
        value: 0.0.0.0
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: AI_PROVIDER
        value: mock
      - key: AI_BASE_URL
        value: http://localhost:11434/v1
      - key: AI_MODEL_NAME
        value: qwen2.5-14b-instruct
      - key: WEB_SEARCH_PROVIDER
        value: mock
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: "25"
      - key: LOG_LEVEL
        value: info
      # Inclua aqui a URL do frontend depois de criado, e a origem
      # padrao da WebView do app nativo (Capacitor). Separadas por virgula.
      - key: CORS_ORIGIN
        value: https://nexus-frontend.onrender.com,https://localhost

  # --- Frontend (build estatico do React/Vite) ---
  - type: web
    name: nexus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Ajuste os dominios abaixo para o nome real do seu servico
      # nexus-backend depois do primeiro deploy (o Render define a URL
      # final apos criar o servico).
      - key: VITE_API_URL
        value: https://nexus-backend.onrender.com/api/v1
      - key: VITE_WS_URL
        value: wss://nexus-backend.onrender.com/api/v1/ws
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
